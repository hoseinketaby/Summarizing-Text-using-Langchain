<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChain: Summarize Text From YT or Website</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="layout">

    <!-- Sidebar: replaces st.sidebar -->
    <aside class="sidebar">
      <h2>Settings</h2>

      <label for="apiKey">Gapgpt API Key</label>
      <input type="password" id="apiKey" placeholder="sk-...">

      <label for="language">Translate to</label>
      <select id="language">
        <option>English</option>
        <option>French</option>
        <option>Persian</option>
        <option>Chinese</option>
        <option>Arabic</option>
      </select>

      <label for="model">Choose the model</label>
      <select id="model">
        <option value="claude-fable-5">claude-fable-5</option>
        <option value="gemini-3.5-flash">gemini-3.5-flash</option>
        <option value="grok-4.3">grok-4.3</option>
        <option value="deepseek-v4-pro">deepseek-v4-pro</option>
        <option value="o3-mini">o3-mini</option>
      </select>
    </aside>

    <!-- Main content: replaces st.title / st.subheader / text_input / button -->
    <main class="main">
      <h1>🦜 LangChain: Summarize Text From YT or Website</h1>
      <h3>Summarize URL</h3>

      <input
        type="text"
        id="url"
        placeholder="Please insert your website or youtube link which you want summarized content from"
      >

      <button id="summarizeBtn">Summarize the content from YT or Website</button>

      <!-- Status area: replaces st.spinner / st.error / st.success -->
      <div id="status" class="status hidden"></div>
      <div id="result" class="result hidden"></div>
    </main>

  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
